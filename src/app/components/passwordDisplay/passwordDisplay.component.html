<div class="password__container">
  <input
    [type]="isHidden() ? 'password' : 'text'"
    [value]="password()"
    readonly
    class="password__input"
    placeholder="Password will appear here:">

  <div class="password__actions">
    <button type="button" class="password__btn" (click)="toggleVisibility.emit()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password__icon">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
        @if (isHidden()) {
          <line x1="1" y1="1" x2="23" y2="23"></line>
        }
      </svg>
    </button>

    <button type="button" class="password__btn" (click)="copy.emit()" [disabled]="!password()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password__icon">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
    </button>
  </div>
</div>
